# Stage 7: Prometheus — Scrape Configuration
# Access the Prometheus UI at http://localhost:9090

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'devopslab'

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Prometheus scrapes itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the .NET API's /metrics endpoint
  - job_name: 'devopslab-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
