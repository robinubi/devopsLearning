# Stage 2: GitHub Actions — CI Pipeline
# Triggers on every push and pull request to main/develop
# Free tier: 2,000 minutes/month on private repos; unlimited on public

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  IMAGE_NAME: devopslab-api

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/DevOpsLab.Api/DevOpsLab.Api.csproj

      - name: Build
        run: dotnet build src/DevOpsLab.Api/DevOpsLab.Api.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test src/DevOpsLab.Api/DevOpsLab.Api.csproj --no-build --configuration Release

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -f docker/Dockerfile .

      - name: Smoke test container
        run: |
          docker run -d -p 8080:8080 --name smoke ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:8080/health
          docker stop smoke
