# Stage 4: Kubernetes — Deployment
# Apply with: kubectl apply -f kubernetes/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devopslab-api
  namespace: devopslab
  labels:
    app: devopslab-api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devopslab-api
  template:
    metadata:
      labels:
        app: devopslab-api
      annotations:
        # Tells Prometheus to scrape this pod automatically
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: devopslab-api:latest
          imagePullPolicy: Never   # Use local minikube image
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: devopslab-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
